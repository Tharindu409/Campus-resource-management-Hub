# App
spring.application.name=smartcampus
server.port=8091

# MongoDB
spring.data.mongodb.uri=REPLACE_WITH_MONGODB_URI

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=REPLACE_WITH_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=REPLACE_WITH_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=REPLACE_WITH_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=REPLACE_WITH_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
app.jwt.secret=REPLACE_WITH_JWT_SECRET
app.jwt.expiration=86400000

# Frontend URL
app.frontend.url=http://localhost:5173

# =========================
# FILE UPLOAD CONFIG (NEW)
# =========================

# Max upload size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Upload directory (relative to project root)
app.upload.dir=uploads

# Backend base URL (IMPORTANT - matches your port)
app.base-url=http://localhost:8091

# =========================
# LOGGING
# =========================
logging.level.com.sliit=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# Admin emails
app.admin.emails=

# DevTools
spring.devtools.restart.enabled=false